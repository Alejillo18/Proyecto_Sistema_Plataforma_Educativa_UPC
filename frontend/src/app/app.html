<router-outlet></router-outlet>

<!-- Floating theme toggle button -->
<button
  (click)="toggleTheme()"
  class="fixed bottom-6 right-6 z-[9999] w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg backdrop-blur-xl border transition-all duration-500 hover:scale-110 hover:rotate-12 group"
  [class]="isDark()
    ? 'bg-white/10 border-white/20 text-yellow-300 hover:bg-white/20 hover:shadow-[0_0_25px_rgba(59,130,246,0.3)]'
    : 'bg-slate-900/80 border-slate-700/50 text-indigo-400 hover:bg-slate-800 hover:shadow-[0_0_25px_rgba(59,130,246,0.2)]'"
  [attr.aria-label]="isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
  @if (isDark()) {
    <svg class="w-5 h-5 transition-transform duration-500 group-hover:rotate-45" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
  } @else {
    <svg class="w-5 h-5 transition-transform duration-500 group-hover:-rotate-45" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  }
</button>
